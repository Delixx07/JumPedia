name: sdg_eco_jump
description: "SDG Eco-Jump — Mobile game platformer vertikal 2D bertema edukasi SDG 4 (Pendidikan Berkualitas)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase Core
  firebase_core: ^2.32.0

  # Firebase Auth
  firebase_auth: ^4.20.0

  # Cloud Firestore
  cloud_firestore: ^4.17.0

  # Firebase Cloud Messaging
  firebase_messaging: ^14.9.0

  # Firebase Analytics (prod only)
  firebase_analytics: ^10.10.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local Notifications (foreground FCM)
  flutter_local_notifications: ^17.2.1

  # Accelerometer / Tilt controls
  sensors_plus: ^4.0.2

  # Navigation
  go_router: ^13.2.0

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/lumi/
    - assets/images/obstacle/
    - assets/collectibles/
    - assets/audio/

  # fonts:
  #   - family: PressStart2P
  #     fonts:
  #       - asset: assets/fonts/PressStart2P-Regular.ttf
