name: sdg_eco_jump
description: "SDG Eco-Jump — Mobile game platformer vertikal 2D bertema edukasi SDG 4 (Pendidikan Berkualitas)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0

  # Audio efek suara game (jump, death)
  flame_audio: ^2.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase Core
  firebase_core: ^2.32.0

  # Firebase Auth
  firebase_auth: ^4.20.0

  # Cloud Firestore
  cloud_firestore: ^4.17.0

  # AI — generate fun fact SDG 4 secara real-time (Google Gemini)
  google_generative_ai: ^0.4.6

  # Firebase Cloud Messaging
  firebase_messaging: ^14.9.0

  # Firebase Analytics (prod only)
  firebase_analytics: ^10.10.0

  # Firebase Crashlytics — pelaporan crash real-time
  firebase_crashlytics: ^3.5.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local Notifications (foreground FCM)
  flutter_local_notifications: ^17.2.1

  # Accelerometer / Tilt controls
  sensors_plus: ^4.0.2

  # Navigation
  go_router: ^13.2.0

  # Penyimpanan preferensi lokal (mis. pilihan bahasa fun fact)
  shared_preferences: ^2.2.3

  # Cupertino icons
  cupertino_icons: ^1.0.8

  # Tipografi kustom (Poppins heading + Nunito body)
  google_fonts: ^6.2.1

  # Supabase Storage — upload foto profil kustom
  supabase_flutter: ^2.5.6

  # Pilih gambar dari galeri / kamera untuk foto profil
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generate app icon (launcher) dari satu file logo
  flutter_launcher_icons: ^0.13.1

# ─── Konfigurasi App Icon ───────────────
# Generate dengan: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_app.png"
  # Latar di belakang logo (logo transparan → diberi warna agar penuh).
  adaptive_icon_background: "#CDE9FF"
  adaptive_icon_foreground: "assets/images/logo_app.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/lumi/
    - assets/images/obstacle/
    - assets/images/obstacle/animation/
    - assets/images/avatars/
    - assets/images/platforms/platform_normal/
    - assets/images/platforms/platform_moving/
    - assets/images/platforms/platform_breakable/
    - assets/images/platforms/platform_breakable/animation/
    - assets/collectibles/
    - assets/collectibles/book/
    - assets/collectibles/book/animation/
    - assets/collectibles/globe/
    - assets/collectibles/globe/animation/
    - assets/audio/

  fonts:
    # Font di-bundle & dipakai langsung sebagai family Flutter (fontFamily),
    # BUKAN lewat google_fonts runtime — supaya tidak ada error "weight not
    # found" / fetch internet. Poppins punya weight lengkap; Nunito variable
    # font didukung Flutter untuk semua weight via satu file.
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
