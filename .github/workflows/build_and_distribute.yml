# ═══════════════════════════════════════
# CI/CD Pipeline — SDG Eco-Jump
# ═══════════════════════════════════════
# Build, test, and distribute to Firebase App Distribution.
# Trigger: push ke main atau pull_request ke main.

name: Build & Distribute

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build-and-distribute:
    name: Build, Test & Distribute
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout Repo ─────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Java (untuk Android build) ───
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ─── 3. Setup Flutter ─────────────
      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─── 4. Install Dependencies ──────
      - name: Install dependencies
        run: flutter pub get

      # ─── 5. Lint / Analyze ────────────
      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos

      # ─── 6. Run Tests ────────────────
      - name: Run unit tests
        run: flutter test --coverage

      # ─── 7. Build App Bundle (prod) ───
      - name: Build Android App Bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          flutter build appbundle \
            --flavor prod \
            --target lib/main_prod.dart \
            --release

      # ─── 8. Upload to Firebase App Distribution ───
      - name: Upload to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          releaseNotes: |
            🚀 SDG Eco-Jump - Build otomatis
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}

      # ─── 9. Upload Build Artifact ─────
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 14
